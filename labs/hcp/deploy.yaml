---
# Run it with:
#   ap labs/hcp/deploy.yaml

- name: 'Clean hcp lab'
  hosts:
    - lab
  vars:
    lab_name: 'hcp'
  roles:
    - role: 'lab'
      vars:
        lab_cleanup: True
  tags:
    - 'clean'
    - 'never'

- name: 'HCP Openshift cluster'
  hosts:
    - 'lab'

  gather_facts: false

  vars:
    lab_abi: True
    lab_abi_ip: "{{ lab_node_network_base }}61"
    lab_api_ips: ["{{ lab_node_network_base }}100"]
    lab_bootstrap_ip: "{{ lab_node_network_base }}254"
    lab_bootstrap_mac: "{{ lab_mac_base }}00"
    lab_ingress_ips: ["{{ lab_node_network_base }}101"]
    lab_name: 'hcp'
    lab_mac_base: 'de:ad:be:ef:03:'
    lab_worker_replicas: 0
    lab_node_disk_data: 150
    lab_node_memory: 48000
    lab_node_cpus: 20
    lab_node_network: "{{ lab_node_network_base }}0/24"
    lab_node_network_base: '172.16.252.'
    lab_node_role: 'master'
    lab_node_cpumode: 'host-passthrough'
    lab_node_cpuflags: ['vmx']
    libvirt_image_dir: '/home/libvirt-ocp'
    install_extra_manifests: []
    lab_hosts:
      - {'id': '61', 'role': 'master'}
      - {'id': '62', 'role': 'master'}
      - {'id': '63', 'role': 'master'}

    # OpenShift installation variables
    ocp_assisted_service_pullsecret: "{{ lab_pull_secret }}"
    ocp_pullsecret: "{{ lab_pull_secret }}"
    ocp_pullsecret_b64: "{{ lab_pull_secret | b64encode }}"

    # HCP specific variables
    lab_path: '/home/jkary/labs'
    lab_configs: "/home/jkary/labs/{{ lab_name }}/config"
    lab_network_name: 'lab-network'
    lab_install: true
    lab_node_disk_pool: 'ocp'
    
    ocp_hcp_kubeapi_ips: ["{{ lab_node_network_base }}102/32"]
    ocp_assisted_service_infraenvs:
      - name: 'hosted'
        ns: 'hardware-inventory'
        hypershift: true
        ntp: ["{{ lab_node_network_base }}1"]
        redfish: "{{ lab_node_network_base }}1"
        inventory:
          - {'name': 'hcp1-worker-1', 'id': '64'}
    ocp_hcp_clusters:
      - name: 'spoke'
        ns: 'spoke'
        infra: 'hosted'
        agent_ns: 'hardware-inventory'
        version: '4.18.4'
        service_network: '172.32.0.0/16'
        domain: 'local.lab'
        lb: "{{ lab_node_network_base }}103"
        replicas: 1

    ocp_ssh_key: >
      ssh-rsa  jkary@dhcp-64-102-214-149.cisco.com
      ssh-rsa  jkary@jkary98-alps

  environment:
    PATH: '/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin'
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/deploy/auth/kubeconfig"

  roles:
    - role: 'lab'
      tags: ['ocp']
    - role: 'ocp_abi'
      tags: ['ocp']
    - role: 'ocp_lvms'
      tags: ['postinst']
    - role: 'ocp_registry'
      tags: ['postinst']
    - role: 'ocp_assisted_service'
      tags: ['postinst', 'assisted']
    - role: 'ocp_hcp'
      tags: ['postinst']

- name: 'Extract spoke cluster configuration'
  gather_facts: false
  hosts:
    - lab
  environment:
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/deploy/auth/kubeconfig"

  tasks:
    - name: 'Enable default catalog sources on spoke cluster'
      kubernetes.core.k8s:
        state: patched
        api_version: hypershift.openshift.io/v1beta1
        kind: HostedCluster
        name: 'spoke'
        namespace: 'spoke'
        definition:
          spec:
            configuration:
              operatorhub:
                disableAllDefaultSources: false
      tags: ['spoke', 'olm']

  roles:
    - role: 'ocp_hcp'
      vars:
        lab_name: 'hcp'
        lab_path: '/home/jkary/labs'
        lab_node_network_base: '172.16.252.'
        spoke_name: 'spoke'
        ocp_hcp_setup_config: true
        ocp_hcp_setup_ingress: false
        ocp_hcp_kubeapi_ips: ["{{ lab_node_network_base }}102/32"]
  tags:
    - 'postinst'
    - 'spoke'

- name: 'Setup spoke cluster storage and ingress'
  hosts:
    - lab
  environment:
    KUBECONFIG: "/home/jkary/labs/hcp/spoke/auth/kubeconfig"

  vars:
    lab_configs: "/home/jkary/labs/hcp/config"

  tasks:
    - name: 'Wait for default CatalogSources to be available'
      kubernetes.core.k8s_info:
        api_version: 'operators.coreos.com/v1alpha1'
        kind: 'CatalogSource'
        namespace: 'openshift-marketplace'
      register: __spoke_catalogsources
      until: >
        __spoke_catalogsources.resources |
        selectattr('status.connectionState.lastObservedState', 'defined') |
        selectattr('status.connectionState.lastObservedState', 'equalto', 'READY') |
        list | length > 0
      retries: 60
      delay: 10
      tags: ['storage', 'olm']

  roles:
    - role: 'ocp_lvms'
      tags: ['storage']
    - role: 'ocp_hcp'
      vars:
        lab_name: 'hcp'
        lab_path: '/home/jkary/labs'
        lab_node_network_base: '172.16.252.'
        spoke_name: 'spoke'
        spoke_lb_ips: ["{{ lab_node_network_base }}103/32"]
        ocp_hcp_kubeapi_ips: ["{{ lab_node_network_base }}102/32"]
        ocp_hcp_kubeapi_name: 'kubeapi-lb-pool'
        ocp_hcp_setup_config: false
        ocp_hcp_setup_ingress: true
  tags:
    - 'postinst'
    - 'spoke'
