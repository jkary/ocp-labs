---
# Run it with:
#   ap labs/std-sno/deploy.yaml

- name: 'Clean std-sno lab'
  hosts:
    - lab
  roles:
    - role: 'lab'
      vars:
        lab_name: 'std-sno'
        lab_cleanup: True
  tags:
    - 'clean'
    - 'never'

- name: 'Setup Single Node OpenShift (SNO)'
  hosts:
    - lab
  environment:
    PATH: '/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin'
  roles:
    - role: 'lab'
      vars:
        lab_abi: True
        lab_abi_ip: "{{ lab_node_network_base }}31"
        lab_api_ips: ["{{ lab_node_network_base }}31"]
        lab_ingress_ips: ["{{ lab_node_network_base }}31"]
        lab_name: 'std-sno'
        lab_master_replicas: 1
        lab_mac_base: 'be:be:ca:fe:05:'
        lab_node_disk_data: 1
        lab_node_network_base: '192.168.125.'
        lab_node_role: 'node'
        lab_hosts:
          - {'id': '31', 'iface': 'enp1s0'}
        libvirt_image_dir: '/home/libvirt-ocp'
        start_install: true
  tags:
    - 'ocp'
