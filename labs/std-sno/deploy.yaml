---
# Run it with:
#   ap labs/std-sno/deploy.yaml

- name: 'Clean std-sno lab'
  hosts:
    - lab
  vars:
    lab_name: 'std-sno'
  roles:
    - role: 'lab'
      vars:
        lab_cleanup: True
  tags:
    - 'clean'
    - 'never'

- name: 'Setup Single Node OpenShift (SNO)'
  hosts:
    - lab
  gather_facts: false

  vars:
    lab_name: 'std-sno'
    lab_abi: True
    lab_network_name: cjunos
    lab_dns_network: 
      - 1.1.1.1
    lab_domain: "{{ lab_network_name }}.lab"
    lab_node_network_base: '172.16.244.'
    lab_abi_ip: "{{ lab_node_network_base }}31"
    lab_api_ips: ["{{ lab_node_network_base }}31"]
    lab_ingress_ips: ["{{ lab_node_network_base }}31"]
    lab_mac_base: 'de:ad:ca:fe:05:'
    lab_master_replicas: 1
    lab_worker_replicas: 0
    lab_node_disk_data: 1
    lab_node_network: "{{ lab_node_network_base }}0/24"
    lab_node_role: 'node'
    lab_hosts:
      - {'id': '31', 'role': 'master', 'iface': 'enp1s0'}
    libvirt_image_dir: '/home/libvirt-ocp'
    start_install: true

    # OpenShift installation variables
    ocp_assisted_service_pullsecret: "{{ lab_pull_secret }}"
    ocp_pullsecret: "{{ lab_pull_secret }}"
    ocp_pullsecret_b64: "{{ lab_pull_secret | b64encode }}"

    ocp_ssh_key: >
      ssh-rsa  jkary@dhcp-64-102-214-149.cisco.com
      ssh-rsa  jkary@jkary98-alps

  environment:
    PATH: '/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin'
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/deploy/auth/kubeconfig"

  roles:
    - role: 'lab'
      tags: ['ocp']
    - role: 'ocp_abi'
      tags: ['ocp']
